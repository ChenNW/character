<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知我 - 关于我们</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:linear-gradient(180deg,#fff5f7 0%,#ffffff 40%,#f6f8ff 100%);
    color:#333;
}
.hero{
    text-align:center;
    padding:80px 20px 60px;
}
.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(255,122,143,.25);
}
.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.hero h1{
    margin-top:24px;
    font-size:40px;
}
.hero p{
    margin-top:10px;
    color:#666;
}
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}
.card{
    background:rgba(255,255,255,.9);
    border-radius:24px;
    padding:28px;
    margin-bottom:20px;
    box-shadow:0 8px 30px rgba(0,0,0,.05);
}
.card h2{
    color:#ff6f8d;
    margin-bottom:15px;
}
.card p{
    line-height:1.9;
    color:#555;
}
.contact-btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 30px;
    border-radius:999px;
    background:linear-gradient(135deg,#ff7a8f,#ffb6c1);
    color:#fff;
    text-decoration:none;
    cursor:pointer;
}
.footer{
    text-align:center;
    color:#999;
    padding:40px;
}
</style>
</head>

<body>

<div class="hero">

    <div class="logo">
        <img src="xinggeIcon.png" alt="知我">
    </div>

    <h1>知我</h1>
    <p>AI性格测试与个性成长平台</p>

</div>

<div class="container">

    <div class="card">
        <h2>🌟 我们是谁</h2>
        <p>
            知我是一个专注于自我探索与个性成长的平台。
            我们希望借助心理学理论与人工智能技术，
            帮助用户更深入地了解自己的性格特征、
            思维方式以及成长潜力。
        </p>
    </div>

    <div class="card">
        <h2>🧠 我们的使命</h2>
        <p>
            让每个人都能更了解自己。
            通过科学、有趣且易于理解的方式，
            帮助用户发现优势、认识不足，
            从而做出更适合自己的选择。
        </p>
    </div>

    <div class="card">
        <h2>🚀 我们的愿景</h2>
        <p>
            打造值得信赖的个人成长平台，
            让每一次测试不仅是结果，
            更是认识自我、提升自我的开始。
        </p>
    </div>

    <div class="card">
        <h2>📧 联系我们</h2>
        <p>
            如有任何建议、问题或合作需求，
            欢迎联系我们。
        </p>

        <!-- 修改后的按钮：点击触发邮件唤起 + 复制邮箱 -->
        <a class="contact-btn" href="javascript:void(0);" onclick="handleEmailClick('guoxuetansuo@163.com');">
            联系技术支持
        </a>
    </div>

</div>

<div class="footer">
© 2026 知我 · All Rights Reserved
</div>

<script>
function handleEmailClick(email) {
    // 1. 尝试唤起系统邮件客户端
    window.location.href = 'mailto:' + email;

    // 2. 复制邮箱地址到剪贴板（提供备选）
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(email).then(function() {
            alert('📋 邮箱地址已复制到剪贴板。\n如果邮件客户端未自动打开，请手动粘贴到收件人。');
        }).catch(function() {
            copyFallback(email);
        });
    } else {
        copyFallback(email);
    }
}

function copyFallback(email) {
    var textarea = document.createElement('textarea');
    textarea.value = email;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        var success = document.execCommand('copy');
        if (success) {
            alert('📋 邮箱地址已复制到剪贴板。\n如果邮件客户端未自动打开，请手动粘贴到收件人。');
        } else {
            alert('❌ 复制失败，请手动输入邮箱：' + email);
        }
    } catch (e) {
        alert('❌ 复制失败，请手动输入邮箱：' + email);
    }
    document.body.removeChild(textarea);
}
</script>

</body>
</html>
